<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | LM TECH 93</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#07111f;
      color:#fff;
      padding:20px;
      margin:0;
    }
    .box{
      max-width:420px;
      margin:40px auto;
      background:#0d1829;
      padding:20px;
      border-radius:16px;
      box-sizing:border-box;
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      box-sizing:border-box;
    }
    input{
      background:#132238;
      color:#fff;
    }
    button{
      background:#00e5ff;
      color:#03131a;
      font-weight:700;
      cursor:pointer;
    }
    #msg{
      margin-top:12px;
      color:#ffb3b3;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Entrar</h1>

    <input id="full_name" placeholder="Seu nome" />
    <input id="phone" placeholder="Seu telefone" />
    <input id="email" type="email" placeholder="Seu email" />
    <input id="password" type="password" placeholder="Sua senha" />

    <button id="signupBtn" type="button">Criar conta</button>
    <button id="loginBtn" type="button">Entrar</button>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const msg = document.getElementById('msg');

    const supabaseUrl = 'https://mwdxvzvcqgowaqsvzqlr.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13ZHh2enZjcWdvd2Fxc3Z6cWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTY2MTIsImV4cCI6MjA5MTU3MjYxMn0.jazJeIkBw3ypj7hX6hrN1-DqjwcLeDra2OmPPA-9W0w';

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    document.getElementById('signupBtn').addEventListener('click', async () => {
      msg.textContent = 'Criando conta...';

      try {
        const full_name = document.getElementById('full_name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
          msg.textContent = 'Preenche email e senha.';
          return;
        }

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name, phone }
          }
        });

        if (error) {
          msg.textContent = 'Erro ao criar conta: ' + error.message;
          return;
        }

        msg.textContent = 'Conta criada com sucesso. Agora clica em Entrar.';
        console.log('SIGNUP OK', data);
      } catch (err) {
        msg.textContent = 'Erro inesperado: ' + err.message;
        console.error(err);
      }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      msg.textContent = 'Entrando...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          msg.textContent = 'Erro ao entrar: ' + error.message;
          return;
        }

        localStorage.setItem('lm_access_token', data.session.access_token);
        msg.textContent = 'Login feito com sucesso. Redirecionando...';
        window.location.href = '/';
      } catch (err) {
        msg.textContent = 'Erro inesperado: ' + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
